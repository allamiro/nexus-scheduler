{{- /*
Integration point for a cluster that already runs Prometheus, rather than a
monitoring stack of our own. The app exposes /metrics; the platform collects it.

Deliberately not shipping Alloy/Mimir/Loki/Grafana in this chart: a real cluster
already has them, and an app chart that brings its own would duplicate storage,
compete for scrape ownership, and make this chart responsible for upgrading four
infrastructure components it does not own. the repo's compose observability overlay (issue #103)
exists for local development, where none of that is true.

Off by default: this needs the Prometheus Operator's CRD, and rendering a
ServiceMonitor into a cluster without it fails the apply. Turning it on is a
statement that the CRD exists.

pdf-service appears only with pdfService.metrics.enabled. It is the one
component REQUIREMENTS §2.5 isolates outright, and its render port stays
api/worker-only: a NetworkPolicy cannot distinguish GET /metrics from
POST /render/* on a shared listener, so scraping that port was never safe
(issue #118). What the flag enables is a dedicated scrape-only listener
(createMetricsApp — it cannot render) on its own port; this ServiceMonitor
targets that port, and the NetworkPolicy admits only
pdfService.metrics.scrapeFrom to it. Chromium stays exactly as unreachable
as before.
*/ -}}
{{- if .Values.observability.serviceMonitor.enabled }}
{{- $components := list
      (dict "name" "api"    "port" "http")
      (dict "name" "worker" "port" "health") }}
{{- if .Values.pdfService.metrics.enabled }}
{{- $components = append $components (dict "name" "pdf-service" "port" "metrics") }}
{{- end }}
{{- range $c := $components }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "nexus-scheduler.fullname" $ }}-{{ $c.name }}
  labels:
    {{- include "nexus-scheduler.labels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $c.name }}
    {{- with $.Values.observability.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "nexus-scheduler.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $c.name }}
  namespaceSelector:
    matchNames:
      - {{ $.Release.Namespace }}
  endpoints:
    - port: {{ $c.port }}
      path: /metrics
      interval: {{ $.Values.observability.serviceMonitor.interval }}
      scrapeTimeout: {{ $.Values.observability.serviceMonitor.scrapeTimeout }}
      # The Operator derives `service` from the Kubernetes Service name, so
      # these targets would arrive as service="<release>-api" while the
      # dashboards — and the Compose collector they were written against —
      # use the bare component name. Every Node/process panel filters on it
      # (`nodejs_eventloop_lag_p99_seconds{service="api"}` and friends), so
      # without this the runtime rows are blank in Kubernetes while the
      # metrics are demonstrably being scraped: the worst kind of empty
      # panel, because nothing is broken. Pinning it here keeps one set of
      # dashboards honest in both places.
      relabelings:
        - targetLabel: service
          replacement: {{ $c.name }}
      {{- with $.Values.observability.serviceMonitor.metricRelabelings }}
      metricRelabelings:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
