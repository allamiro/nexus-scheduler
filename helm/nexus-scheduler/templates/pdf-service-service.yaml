apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexus-scheduler.fullname" . }}-pdf-service
  labels:
    {{- include "nexus-scheduler.labels" . | nindent 4 }}
    app.kubernetes.io/component: pdf-service
spec:
  # No Ingress ever routes to this Service — it's cluster-internal only,
  # reached exclusively by the api/worker Deployments (see the
  # NetworkPolicy alongside this file).
  selector:
    {{- include "nexus-scheduler.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: pdf-service
  ports:
    - port: {{ .Values.pdfService.port }}
      targetPort: {{ .Values.pdfService.port }}
      name: http
    {{- if .Values.pdfService.metrics.enabled }}
    # Scrape-only listener (issue #118) — the NetworkPolicy admits
    # pdfService.metrics.scrapeFrom to this port and nothing else.
    - port: {{ .Values.pdfService.metrics.port }}
      targetPort: {{ .Values.pdfService.metrics.port }}
      name: metrics
    {{- end }}
