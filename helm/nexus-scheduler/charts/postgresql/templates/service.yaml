apiVersion: v1
kind: Service
metadata:
  name: {{ include "postgresql.fullname" . }}
  labels:
    {{- include "postgresql.labels" . | nindent 4 }}
spec:
  # Headless — the standard pattern for a StatefulSet's governing
  # Service; a single stable DNS name is all a single-instance
  # PostgreSQL needs, no load-balanced ClusterIP required.
  clusterIP: None
  selector:
    {{- include "postgresql.selectorLabels" . | nindent 4 }}
  ports:
    - port: 5432
      targetPort: 5432
      name: postgresql
