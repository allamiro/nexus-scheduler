apiVersion: v1
kind: Service
metadata:
  name: {{ include "redis.fullname" . }}
  labels:
    {{- include "redis.labels" . | nindent 4 }}
spec:
  # Headless — the standard pattern for a StatefulSet's governing
  # Service; a single stable DNS name is all a single-instance Redis
  # needs, no load-balanced ClusterIP required.
  clusterIP: None
  selector:
    {{- include "redis.selectorLabels" . | nindent 4 }}
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
