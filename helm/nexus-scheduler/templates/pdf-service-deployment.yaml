apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexus-scheduler.fullname" . }}-pdf-service
  labels:
    {{- include "nexus-scheduler.labels" . | nindent 4 }}
    app.kubernetes.io/component: pdf-service
spec:
  replicas: {{ .Values.pdfService.replicaCount }}
  selector:
    matchLabels:
      {{- include "nexus-scheduler.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: pdf-service
  template:
    metadata:
      labels:
        {{- include "nexus-scheduler.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: pdf-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: {{ .Values.pdfService.port | quote }}
    spec:
      serviceAccountName: {{ include "nexus-scheduler.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: pdf-service
          image: "{{ .Values.image.registry }}/{{ .Values.image.repository }}-pdf-service:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.pdfService.port }}
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: {{ .Values.pdfService.port | quote }}
            - name: LOG_LEVEL
              value: "info"
          livenessProbe:
            httpGet: { path: /healthz, port: {{ .Values.pdfService.port }} }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /readyz, port: {{ .Values.pdfService.port }} }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.pdfService.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
