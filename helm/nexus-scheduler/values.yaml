# Default values for nexus-scheduler.
# Override per-environment; do not edit defaults for a specific
# deployment — use -f/--set at install time instead.

image:
  # In an air-gapped deployment, point this at the internal/offline
  # registry the images were relocated to (REQUIREMENTS §3/§9.1).
  registry: "registry.example.internal"
  repository: "nexus-scheduler"
  tag: "0.1.0"
  pullPolicy: IfNotPresent

api:
  replicaCount: 2
  port: 3000
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "1", memory: "512Mi" }

worker:
  replicaCount: 2
  healthPort: 3001
  resources:
    requests: { cpu: "200m", memory: "256Mi" }
    limits: { cpu: "1", memory: "512Mi" }
  # §2.1: worker replica count is the actual lever for concurrency beyond
  # the in-process GLOBAL_MAX_CONCURRENT_RUNS limit.

# Isolated PDF-rendering component (§2.5) — the only place that launches
# headless Chromium, hence the meaningfully higher memory request/limit
# than api/worker now need. See pdf-service-networkpolicy.yaml for the
# "no egress" enforcement this split enables.
pdfService:
  replicaCount: 2
  port: 4100
  resources:
    requests: { cpu: "100m", memory: "384Mi" }
    limits: { cpu: "1", memory: "1Gi" }

frontend:
  replicaCount: 2
  port: 8080
  resources:
    requests: { cpu: "50m", memory: "64Mi" }
    limits: { cpu: "250m", memory: "128Mi" }

# The target environment already runs nginx as a reverse proxy in front
# of the application (REQUIREMENTS §9.1) — this chart does not deploy
# nginx. Enable `ingress` only if the cluster's existing proxy expects to
# reach this app via an Ingress resource rather than a Service directly.
ingress:
  enabled: false
  className: ""
  host: "nexus-scheduler.example.mil"
  tls:
    enabled: false
    secretName: ""

# Bundled by default — a first-party, minimal single-instance subchart
# vendored at charts/postgresql (not Bitnami's, see Chart.yaml), so
# `helm install` never needs network access to stand this up. Set
# `enabled: false` to bring your own external instance instead and fill
# in `externalDatabase` below; either way, `secrets.databaseSecretName`
# below is what the app itself actually reads its connection from.
postgresql:
  enabled: true
  auth:
    username: nexus
    database: nexus_scheduler
    # Pre-existing Secret (never created by this chart, must exist
    # before install) holding *this bundled instance's own* password.
    # Expected key: `postgres-password`. This is intentionally a
    # different Secret from `secrets.databaseSecretName` below, which
    # holds the app's full connection string — populate both with the
    # same password; nothing here cross-references the other
    # automatically.
    existingSecretName: "nexus-scheduler-postgresql"
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: "" # empty = cluster default StorageClass

# Bundled by default — same rationale as postgresql above, vendored at
# charts/redis. Set `enabled: false` to bring your own and fill in
# `externalRedis` below.
redis:
  enabled: true
  auth:
    # Pre-existing Secret (never created by this chart) holding *this
    # bundled instance's own* password. Expected key: `redis-password`.
    # Same "two related but separate Secrets" note as postgresql.auth
    # above applies here, against `secrets.redisSecretName` below.
    existingSecretName: "nexus-scheduler-redis"
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: "" # empty = cluster default StorageClass

externalDatabase:
  # Used only when postgresql.enabled=false. Only host/port live here —
  # they're not secret; the connection's actual credentials come from
  # secrets.databaseSecretName below same as the bundled case.
  host: ""
  port: 5432

externalRedis:
  # Used only when redis.enabled=false. See externalDatabase above for
  # why only host/port live here.
  host: ""
  port: 6379

# Names of pre-existing Kubernetes Secrets this chart mounts as env vars.
# None of these are created by the chart — REQUIREMENTS §9.1: "never
# baked into images" and never generated by the chart either, unlike the
# local Compose stack's randomly-generated dev secrets.
secrets:
  # Keys expected in this Secret: SESSION_SECRET, API_KEY_ENCRYPTION_KEY,
  # BOOTSTRAP_ADMIN_EMAIL, BOOTSTRAP_ADMIN_PASSWORD (the built-in
  # break-glass admin, REQUIREMENTS §4 — its password is re-synced from
  # this value on every API pod start, so rotating it here and rolling
  # the Deployment is how an operator recovers admin access).
  appSecretName: "nexus-scheduler-app"
  # Keys expected: OIDC_CLIENT_SECRET.
  oidcSecretName: "nexus-scheduler-oidc"
  # Keys expected: DATABASE_URL — one fully-formed PostgreSQL connection
  # string, e.g. postgresql://nexus:<password>@<release>-postgresql:5432/nexus_scheduler
  # (bundled) or postgresql://<user>:<password>@<externalDatabase.host>:<port>/<db>
  # (bring-your-own). Kept as a single pre-composed string rather than
  # separate host/user/password fields Helm templates would reassemble —
  # simpler and more robust than reconstructing it from pieces whose
  # names could drift across chart versions, and it's the one thing both
  # the bundled-subchart and bring-your-own paths need in common anyway.
  databaseSecretName: "nexus-scheduler-database"
  # Keys expected: REDIS_URL — one fully-formed Redis connection string,
  # e.g. redis://:<password>@<release>-redis:6379 (bundled) or
  # redis://:<password>@<externalRedis.host>:<port> (bring-your-own).
  # Same "pre-composed string, not separate pieces" rationale as
  # databaseSecretName above.
  redisSecretName: "nexus-scheduler-redis-auth"
  # SMTP (§5) is NOT a K8s Secret — it's admin-configured at runtime via
  # the Admin UI and stored (password encrypted) in the app's own
  # database, the same as branding/classification-banner settings.

oidc:
  issuerUrl: ""
  clientId: "nexus-scheduler"
  redirectUri: ""

librechat:
  baseUrl: ""
  tls:
    # PEM-encoded custom CA certificate(s) to trust when this app calls
    # LibreChat over HTTPS — for environments (like this one) where
    # LibreChat's cert chains up to an internal/custom CA rather than a
    # publicly trusted one. Paste the full chain here, or supply it at
    # install time with `--set-file librechat.tls.caBundle=ca-bundle.pem`
    # instead of editing this file. Left empty (the default), no
    # ConfigMap is created and Node's normal public trust store is used
    # unmodified. Not a Secret: CA certificates are public by
    # definition, so this is rendered into a ConfigMap
    # (see templates/librechat-ca-configmap.yaml) mounted into the api
    # and worker containers, whose path is exported via the
    # NODE_EXTRA_CA_CERTS environment variable — Node's fetch()
    # (everything this app uses to call LibreChat) honors that
    # process-wide with no application code changes needed.
    caBundle: ""
    # DANGEROUS: disables ALL TLS certificate validation for every
    # outbound HTTPS call this app makes (not narrowly scoped to
    # LibreChat), via NODE_TLS_REJECT_UNAUTHORIZED=0. Intended only for
    # temporarily testing against a LibreChat instance whose cert chain
    # isn't sorted out yet — never enable this in a production install,
    # and prefer caBundle above once you have the real CA cert(s).
    insecureSkipVerify: false

serviceAccount:
  create: true
  name: ""

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
